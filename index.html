<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>學習筆記目錄</title>
    <style>
        body { 
            font-family: sans-serif; 
            line-height: 1.6; 
            max-width: 800px; /* 稍微加大容器寬度 */
            margin: 40px auto; 
            padding: 20px; 
            background-color: #000000; 
            color: #ffffff;
        }

        h1 { 
            border-bottom: 2px solid #444;
            padding-bottom: 10px; 
            color: #4da3ff;
            margin-bottom: 30px;
        }

        /* 圖片與目錄的容器 */
        .container {
            position: relative;
            display: inline-block; /* 讓容器大小等於圖片大小 */
        }

        /* 目錄樣式：絕對定位在圖片上 */
        ul { 
            list-style: none; 
            padding: 0; 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            gap: 2px;
            
            position: absolute; 
            /* --- 以下是微調位置的關鍵 --- */
            top: 48%;    /* 調整百分比讓目錄上下移動 */
            left: 48%;   /* 調整百分比讓目錄左右移動 */
            transform: translate(-50%, -50%); /* 確保目錄中心點對準座標 */
            /* ------------------------- */
            
            z-index: 999;
        }

        li { margin: 0; }

        a { 
            text-decoration: none; 
            color: #4da3ff; 
            font-size: 18px; 
            font-weight: bold;
            /* 增加一點文字陰影，確保在圖片背景上清晰可見 */
            text-shadow: 2px 2px 4px #000000;
        }

        a:hover { 
            color: #80bfff; 
            text-decoration: underline;
        }

        .note-image {
            display: block;
            width: 100%; /* 寬度填滿容器 */
            max-width: 500px; /* 限制圖片不要太大 */
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>重點整理</h1>

    <div class="container">
        <ul>
            <li><a href="ch01_study_summary.html">ch01</a></li>
            <li><a href="ch02_study_summary.html">ch02</a></li>
            <li><a href="ch03_network_security_study.html">ch03</a></li>
            <li><a href="ch04_study_summary.html">ch04</a></li>
            <li><a href="ch05_study_summary.html">ch05</a></li>
        </ul>

        <img src="IMG_9223.jpg" alt="Note Image" class="note-image">
    </div>

</body>
</html>
