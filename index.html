    <style>
        body { 
            font-family: sans-serif; 
            background-color: #000000; 
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; /* 讓內容置中 */
            padding: 20px;
        }

        h1 { 
            border-bottom: 2px solid #444;
            padding-bottom: 10px; 
            color: #4da3ff;
            width: 100%;
            max-width: 600px;
        }

        /* 圖片容器 */
        .container {
            position: relative;
            margin-top: 20px;
            width: fit-content;
        }

        /* 目錄位置 */
        ul { 
            list-style: none; 
            padding: 0; 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            gap: 5px;
            
            position: absolute; 
            top: 48%;    /* 調整上下位置：越大越往下 */
            left: 48%;   /* 調整左右位置：越大越往右 */
            transform: translate(-50%, -50%);
            z-index: 999;
        }

        a { 
            text-decoration: none; 
            color: #4da3ff; 
            font-size: 18px; 
            font-weight: bold;
            text-shadow: 2px 2px 4px #000; /* 文字陰影防止字體模糊 */
        }

        a:hover { color: #80bfff; }

        .note-image {
            display: block;
            max-width: 500px; /* 限制圖片顯示大小 */
            width: 100%;
            height: auto;
        }
